name: address-list.rsc

on:
  schedule:
    - cron: "0 * * * *"
    
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: gen
        run: |
          set -e

          curl -LO https://raw.githubusercontent.com/cokebar/gfwlist2dnsmasq/master/gfwlist2dnsmasq.sh
          chmod +x gfwlist2dnsmasq.sh
          ./gfwlist2dnsmasq.sh -o address-list.txt -l

          echo "# Address List - MikroTik RouterOS DNS FWD (Forward) Records" > address-list.rsc
          echo "# Last modified: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S') CST" >> address-list.rsc
          echo "#" >> address-list.rsc
          echo "/ip dns static" >> address-list.rsc
          #echo "remove [find forward-to=1.1.1.1]" >> address-list.rsc
          #echo "remove [find forward-to=1.1.1.1]" >> address-list.rsc
          #echo ":delay 10" >> address-list.rsc
          sed "s/^/add type=FWD match-subdomain=yes forward-to=1.1.1.1 address-list=1.1.1.1 name=/g" address-list.txt >> address-list.rsc

      - name: git
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add address-list.rsc

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update address-list.rsc"
          git push origin main
