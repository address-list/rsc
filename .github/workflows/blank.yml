name: Update address-list.rsc

on:
  schedule:
    # 每天 18:00 CST = 10:00 UTC
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate address list
        run: |
          set -e

          curl -LO https://raw.githubusercontent.com/cokebar/gfwlist2dnsmasq/master/gfwlist2dnsmasq.sh
          chmod +x gfwlist2dnsmasq.sh
          ./gfwlist2dnsmasq.sh -o address-list.txt -l

          echo "# MikroTtik RouterOS DNS Forward address-list.rsc" > address-list.rsc
          echo "# Update time: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S') CST" >> address-list.rsc
          echo "#" >> address-list.rsc
          echo "/ip dns static" >> address-list.rsc
          echo "remove [find forward-to=1.1.1.1]" >> address-list.rsc
          echo "remove [find forward-to=1.1.1.1]" >> address-list.rsc
          echo ":delay 10" >> address-list.rsc
          sed "s/^/add type=FWD match-subdomain=yes forward-to=1.1.1.1 address-list=1.1.1.1 name=/g" /tmp/address-list.txt >> address-list.rsc

      - name: Commit and push if changed
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add address-list.rsc

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto update address-list.rsc $(date -u +%Y-%m-%d)"
          git push origin main
