name: address-list.rsc

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download gfwlist
        run: |
          curl -L https://raw.githubusercontent.com/gfwlist/gfwlist/master/gfwlist.txt -o gfwlist.txt

          echo "new_hash=$(sha256sum gfwlist.txt | awk '{print $1}')" >> $GITHUB_ENV

      - name: Load old hash
        run: |
          if [ -f .gfwlist_hash ]; then
            echo "old_hash=$(cat .gfwlist_hash)" >> $GITHUB_ENV
          else
            echo "old_hash=none" >> $GITHUB_ENV
          fi

      - name: Check update
        id: check
        run: |
          if [ "$new_hash" = "$old_hash" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No update"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Updated detected"
          fi

      - name: Generate files
        if: steps.check.outputs.changed == 'true'
        run: |
          set -e

          base64 -d gfwlist.txt \
          | sed -E 's/^\|\||^@@\|\||^!.*|^\[.*//g' \
          | grep -Eo '([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}' \
          | sed 's/^[-|]*//' \
          | sort -u > address-list.txt

          echo "# Address List - RouterOS DNS Resolvers Forward Records" > address-list.rsc
          echo "# Last modified: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S') CST" >> address-list.rsc
          echo "#" >> address-list.rsc
          echo "/ip dns static" >> address-list.rsc
          sed "s/^/add type=FWD match-subdomain=yes forward-to=1.1.1.1 address-list=1.1.1.1 name=/g" address-list.txt >> address-list.rsc

      - name: Commit changes
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "$new_hash" > .gfwlist_hash

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add address-list.rsc address-list.txt .gfwlist_hash

          git commit -m "Update address-list.rsc"
          git push origin main
