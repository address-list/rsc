name: getlink

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:     

jobs:
  get-url:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fetch Chrome URL from Omaha
      id: fetch_chrome
      run: |
       
        XML_DATA='<?xml version="1.0" encoding="UTF-8"?>
        <request protocol="3.0" updater="Omaha" updaterversion="1.3.36.322" shell_version="1.3.36.322" ismachine="1" sessionid="{11111111-1111-1111-1111-111111111111}">
            <os platform="win" version="10.0" sp="" arch="x64"/>
            <app appid="{8A69D345-D564-463C-AFF1-A69D9E530F96}" version="" nextversion="" ap="x64-stable-statsdef_1" lang="en-US" brand="GGLS" client="">
                <updatecheck/>
            </app>
        </request>'

        RESPONSE=$(curl -s -X POST -d "$XML_DATA" https://tools.google.com/service/update2)
        
       
        BASE_URL=$(echo "$RESPONSE" | grep -oP 'codebase="\K[^"]+' | head -n 1)
        FILE_PATH=$(echo "$RESPONSE" | grep -oP 'run="\K[^"]+')
        VERSION=$(echo "$RESPONSE" | grep -oP 'version="\K[^"]+' | head -n 1)
        
       
        DOWNLOAD_URL="${BASE_URL}${FILE_PATH}"
        
       
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV

    - name: Append URL to txt file
      run: |
       
        UPDATE_TIME=$(date -d "+8 hours" "+%Y-%m-%d %H:%M:%S")
        
       
       
        echo "[$UPDATE_TIME] ${{ env.DOWNLOAD_URL }}" >> links.txt
        
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
       
        git add links.txt
        git diff-index --quiet HEAD || git commit -m "Update"
        git push
